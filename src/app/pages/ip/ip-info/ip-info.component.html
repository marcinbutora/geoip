<div id="map" class="full"></div>
<div class="info-panel">
  <app-spinner [isLoading]="isLoading"></app-spinner>
  <div *ngIf="errorMessage" class="alert-glass" style="margin-top: 1rem;">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    {{ errorMessage | translate }}
  </div>
  <div *ngIf="!isLoading && !errorMessage" class="panel-content">
    <app-data [data]="data"></app-data>
    <div class="extra-sections">
      <app-weather [weather]="weatherData"></app-weather>
      <app-timezone [timezone]="timezoneData"></app-timezone>
    </div>
  </div>
</div>
