<div class="cookie-banner" *ngIf="visible">
  <p class="cookie-text">
    {{ 'cookieText' | translate }}
  </p>
  <div class="cookie-actions">
    <button class="cookie-btn cookie-btn-accept" (click)="accept()">{{ 'cookieAccept' | translate }}</button>
    <button class="cookie-btn cookie-btn-reject" (click)="reject()">{{ 'cookieReject' | translate }}</button>
  </div>
</div>
