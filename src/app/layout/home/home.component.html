<div id="map" class="full"></div>
<div class="home-panel">
  <div class="panel-header">
    <div class="brand-icon">🌐</div>
    <h1 class="brand-title">GeoIP</h1>
    <p class="brand-sub">{{ 'brandSub' | translate }}</p>
  </div>

  <form [formGroup]="ipForm" class="home-form">
    <div class="input-group">
      <input
        type="text"
        class="form-input"
        id="ip"
        formControlName="ip"
        [placeholder]="'ipPlaceholder' | translate"
        (input)="onIpInput($event)"
      />
      <button type="button" class="btn-detect" (click)="getMyIP()" [title]="'detectIp' | translate">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <p *ngIf="isFormNotValid()" class="error-msg">{{ 'enterValidIp' | translate }}</p>

    <div *ngIf="ipAddressGetFromApi" class="city-badge">
      📍 {{ city }}, {{ country }}
    </div>

    <div class="coord-grid">
      <div class="coord-card">
        <span class="coord-label">{{ 'latitude' | translate }}</span>
        <span class="coord-value">{{ latitude || '--' }}</span>
      </div>
      <div class="coord-card">
        <span class="coord-label">{{ 'longitude' | translate }}</span>
        <span class="coord-value">{{ longitude || '--' }}</span>
      </div>
    </div>

    <div class="alert-glass" *ngIf="hasSearched && !latitude">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ 'noLocation' | translate }} <strong>{{ ipAddressGetFromApi }}</strong>
    </div>

    <button
      type="button"
      class="btn-primary-custom"
      (click)="onCheck()"
      [disabled]="!latitude"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
        <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
      </svg>
      {{ 'showOnMap' | translate }}
    </button>
  </form>
</div>
